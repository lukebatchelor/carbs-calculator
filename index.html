<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Carbs" />
    <title>Carbs Calculator</title>
    <!-- Apply persisted theme before first paint to avoid flash -->
    <script>
      (function () {
        var hue = localStorage.getItem('theme-hue') || '142'
        var sd = localStorage.getItem('theme-dark')
        var dark = sd !== null ? sd === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches
        var r = document.documentElement
        r.style.setProperty('--hue', hue)
        if (dark) r.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
